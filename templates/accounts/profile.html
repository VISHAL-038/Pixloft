{% extends 'base.html' %}
{% block title %}Profile — Pixloft{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Profile</h1>
</div>

<div class="profile-card">
  <div class="profile-avatar">{{ user.username|first|upper }}</div>
  <div class="profile-info">
    <div class="profile-name">{{ user.username }}</div>
    <div class="profile-meta">Joined {{ user.date_joined|date:"F Y" }}</div>
    <div class="profile-meta">{{ user.images.count }} image{{ user.images.count|pluralize }} uploaded</div>
  </div>
</div>
{% endblock %}
